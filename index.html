<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Family Movie Selection Tally</title>
<style>
:root{
  --bg:#0d0b14;--card:#191625;--text:#fff7ef;--muted:#c9bfd0;--line:rgba(255,255,255,.12);
  --pink:#ff5c8a;--yellow:#ffd166;--green:#9ff3c3;--shadow:0 18px 48px rgba(0,0,0,.45)
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:
    radial-gradient(circle at 10% 0%,rgba(255,92,138,.15),transparent 26rem),
    radial-gradient(circle at 90% 10%,rgba(255,209,102,.10),transparent 24rem),
    var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
header{display:none}
.wrap{max-width:1220px;margin:0 auto;padding:10px 12px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(185px,1fr));
  gap:16px;
  padding:12px 0 164px;
}
.card{
  position:relative;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.card.hasVotes{border-color:rgba(255,209,102,.65)}
.posterLink{display:block;position:relative;text-decoration:none;color:inherit}
.posterLink:after{
  content:"▶ Trailer";
  position:absolute;
  left:10px;
  bottom:10px;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(255,255,255,.25);
  border-radius:999px;
  padding:7px 10px;
  font-size:.78rem;
  font-weight:950;
}
.poster{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  display:block;
  background:linear-gradient(135deg,rgba(255,209,102,.32),rgba(255,92,138,.25));
}
.fallback{
  aspect-ratio:2/3;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  text-align:center;
  background:
    linear-gradient(135deg,rgba(255,209,102,.38),rgba(255,92,138,.34)),
    repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0 8px,transparent 8px 16px);
}
.fallbackInner{
  border:2px solid rgba(255,255,255,.65);
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px;
}
.fallbackTitle{font-size:1.2rem;font-weight:950;letter-spacing:-.05em}
.fallbackYear{margin-top:12px;color:#fff;font-weight:800}
.info{padding:12px 16px 18px}
.title{font-weight:950;line-height:1.1;letter-spacing:-.035em}
.year{color:var(--muted);font-size:.85rem;margin-top:3px}
.voteTotal{
  position:absolute;
  top:8px;right:8px;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(255,255,255,.28);
  border-radius:999px;
  padding:7px 10px;
  font-weight:950;
  z-index:2;
}
.controls{
  display:grid;
  grid-template-columns:40px 1fr 40px;
  gap:7px;
  margin-top:10px;
  align-items:center;
}
.countBox{
  text-align:center;
  border:1px solid var(--line);
  border-radius:12px;
  padding:9px 4px;
  background:rgba(255,255,255,.055);
  font-weight:950;
  font-size:.85rem;
}
.smallBtn{
  height:40px;
  border-radius:12px;
  font-size:1.3rem;
  padding:0;
  border:1px solid var(--line);
  background:rgba(255,255,255,.07);
  color:var(--text);
  font:inherit;
  font-weight:850;
  cursor:pointer;
}
.topPick .ribbon{display:block}
.ribbon{
  position:absolute;
  left:8px;top:8px;
  background:var(--green);
  color:#102015;
  border-radius:999px;
  padding:6px 8px;
  font-size:.72rem;
  font-weight:950;
  display:none;
  z-index:2;
}

/* Bottom command center */
.bottomBar{
  position:fixed;
  left:0;right:0;bottom:0;
  z-index:30;
  background:rgba(13,11,20,.94);
  backdrop-filter:blur(18px);
  border-top:1px solid var(--line);
  box-shadow:0 -18px 48px rgba(0,0,0,.55);
  transition:transform .22s ease, opacity .22s ease;
}
.bottomBar.collapsed{
  transform:translateY(calc(100% - 58px));
}
.bottomInner{
  max-width:1220px;
  margin:0 auto;
  padding:9px 14px calc(10px + env(safe-area-inset-bottom));
}
.dockTop{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
}
.brand{
  min-width:0;
}
.brandTitle{
  font-size:1.05rem;
  font-weight:950;
  letter-spacing:-.04em;
  line-height:1;
}
.status{
  color:var(--muted);
  font-size:.76rem;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-top:3px;
}
.score{
  border:1px solid var(--line);
  border-radius:14px;
  padding:7px 10px;
  background:linear-gradient(135deg,rgba(255,209,102,.18),rgba(255,92,138,.16));
  min-width:104px;
}
.score b{font-size:1.1rem}
.score div{font-size:.78rem}
.score small{font-size:.7rem;color:var(--muted)}
.toggleDock{
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.08);
  color:var(--text);
  width:42px;height:42px;
  font-weight:950;
  cursor:pointer;
}
.toolbar{
  display:grid;
  grid-template-columns:1fr 168px 118px 92px;
  gap:8px;
  align-items:center;
}
input,select,button{
  border:1px solid var(--line);
  border-radius:13px;
  padding:11px;
  background:rgba(255,255,255,.07);
  color:var(--text);
  font:inherit;
}
button{font-weight:850;cursor:pointer}
button.primary{
  background:linear-gradient(135deg,var(--yellow),var(--pink));
  color:#120d14;
  border:none;
}
.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:8px;
}
.stat{
  background:rgba(255,255,255,.055);
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px 10px;
}
.stat .name{color:var(--muted);font-size:.72rem}
.stat .num{font-size:1rem;font-weight:900;margin-top:2px}
.progress{
  height:7px;
  background:rgba(255,255,255,.1);
  border-radius:99px;
  overflow:hidden;
  margin-top:8px;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--yellow),var(--pink));
}

@media(max-width:820px){
  .wrap{padding:6px}
  .grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
    padding-top:6px;
    padding-bottom:154px;
  }
  .card{border-radius:12px}
  .info{padding:10px 12px 14px}
  .title{font-size:.88rem}
  .year{font-size:.75rem}
  .posterLink:after{font-size:.66rem;padding:5px 7px;left:7px;bottom:7px}
  .voteTotal{top:6px;right:6px;padding:5px 8px;font-size:.8rem}
  .ribbon{left:6px;top:6px;font-size:.64rem;padding:5px 7px}
  .controls{grid-template-columns:minmax(38px,46px) minmax(72px,1fr) minmax(38px,46px);gap:10px;margin-top:10px;padding:0 2px}
  .smallBtn{height:38px;border-radius:12px}
  .countBox{font-size:.72rem;padding:8px 4px;border-radius:12px}

  .bottomInner{padding:7px 10px calc(8px + env(safe-area-inset-bottom))}
  .dockTop{grid-template-columns:1fr auto auto;margin-bottom:6px}
  .brandTitle{font-size:.98rem}
  .status{font-size:.68rem;max-width:48vw}
  .score{padding:6px 8px;min-width:92px}
  .score b{font-size:1rem}
  .score div{font-size:.68rem}
  .score small{font-size:.62rem}
  .toggleDock{width:36px;height:36px}

  .toolbar{
    grid-template-columns:1fr 1fr;
    gap:7px;
  }
  .toolbar input{grid-column:1/-1}
  .toolbar select{grid-column:1/2}
  .toolbar .primary{grid-column:2/3}
  .toolbar #refresh{grid-column:1/-1}
  input,select,button{padding:10px;border-radius:12px}
  .summary{display:none}
  .bottomBar.collapsed{
    transform:translateY(calc(100% - 50px));
  }
}

/* Balanced vote controls: keeps minus/count/plus evenly inset from both card borders */
.card .info .controls{
  box-sizing:border-box;
  overflow:hidden;
}
.card .info .controls .minus,
.card .info .controls .plus{
  justify-self:stretch;
}
.card .info .controls .countBox{
  display:flex;
  align-items:center;
  justify-content:center;
  white-space:normal;
  line-height:1.05;
}
@media(max-width:420px){
  .card .info{padding-left:11px;padding-right:11px}
  .card .info .controls{gap:9px}
}


/* v7 fix: prevent + / - vote controls from clipping in two-column poster cards */
.card{
  overflow:hidden;
}
.card .info{
  padding:10px 12px 14px !important;
}
.card .info .controls{
  display:grid !important;
  grid-template-columns:44px minmax(0,1fr) 44px !important;
  gap:8px !important;
  width:100% !important;
  max-width:100% !important;
  padding:0 !important;
  margin-top:10px !important;
  align-items:center !important;
  overflow:visible !important;
}
.card .info .smallBtn{
  width:44px !important;
  min-width:44px !important;
  max-width:44px !important;
  height:42px !important;
  padding:0 !important;
  border-radius:13px !important;
  font-size:1.45rem !important;
  line-height:1 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
}
.card .info .countBox{
  min-width:0 !important;
  max-width:100% !important;
  width:100% !important;
  padding:8px 4px !important;
  border-radius:13px !important;
  font-size:.82rem !important;
  line-height:1.05 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  text-align:center !important;
  white-space:normal !important;
  overflow:hidden !important;
}
@media(max-width:820px){
  .grid{
    grid-template-columns:repeat(2,minmax(0,1fr)) !important;
    gap:10px !important;
  }
  .card .info{
    padding:9px 10px 12px !important;
  }
  .card .info .controls{
    grid-template-columns:38px minmax(0,1fr) 38px !important;
    gap:7px !important;
  }
  .card .info .smallBtn{
    width:38px !important;
    min-width:38px !important;
    max-width:38px !important;
    height:38px !important;
    border-radius:12px !important;
    font-size:1.35rem !important;
  }
  .card .info .countBox{
    font-size:.7rem !important;
    padding:7px 2px !important;
    border-radius:12px !important;
  }
}
@media(max-width:390px){
  .grid{
    gap:8px !important;
  }
  .card .info{
    padding:8px 8px 10px !important;
  }
  .card .info .controls{
    grid-template-columns:34px minmax(0,1fr) 34px !important;
    gap:6px !important;
  }
  .card .info .smallBtn{
    width:34px !important;
    min-width:34px !important;
    max-width:34px !important;
    height:36px !important;
    font-size:1.25rem !important;
  }
  .card .info .countBox{
    font-size:.66rem !important;
  }
}

</style></head><body>
<header></header>
<main class="wrap"><div class="grid" id="grid"></div></main>
<div class="bottomBar collapsed" id="bottomBar">
  <div class="bottomInner">
    <div class="dockTop">
      <div class="brand">
        <div class="brandTitle">Movie Vote</div>
        <div id="status" class="status">Loading shared tally...</div>
      </div>
      <div class="score"><div><b id="selectedTotal">0</b> total</div><small id="movieTotal">0 movies</small></div>
      <button class="toggleDock" id="toggleDock" type="button" aria-label="Expand controls">⌃</button>
    </div>
    <div class="toolbar">
      <input id="search" placeholder="Search movies..."/>
      <select id="sort"><option value="priority">Original order</option><option value="votes">Most selected</option><option value="year">Year</option><option value="title">Title</option></select>
      <button class="primary" id="exportCsv">Export CSV</button>
      <button id="refresh">Refresh</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="progress"><div id="bar" class="bar"></div></div>
  </div>
</div>

 style="font-size:1rem;line-height:1.2">${leaders}</div></div>`;selectedTotal.textContent=total;movieTotal.textContent=`${MOVIES.length} movies`;bar.style.width=Math.min(100,(picked/MOVIES.length)*100)+"%"}function render(){const q=search.value.trim().toLowerCase();let list=MOVIES.map((m,i)=>({...m,idx:i,selections:countFor(m)})).filter(m=>m.title.toLowerCase().includes(q)||String(m.year).includes(q));if(sort.value==="votes")list.sort((a,b)=>b.selections-a.selections||a.idx-b.idx);if(sort.value==="year")list.sort((a,b)=>a.year-b.year||a.title.localeCompare(b.title));if(sort.value==="title")list.sort((a,b)=>a.title.localeCompare(b.title));const max=Math.max(0,...MOVIES.map(m=>countFor(m)));grid.innerHTML="";list.forEach(movie=>{const c=countFor(movie);const card=document.createElement("article");card.className="card"+(c>0?" hasVotes":"")+(c===max&&max>0?" topPick":"");card.innerHTML=`<div class="ribbon">Top pick</div><div class="voteTotal">${c}</div><a class="posterLink" href="${movie.trailerUrl}" target="_blank" rel="noopener noreferrer" title="Open ${movie.title} trailer"><img class="poster" alt="${movie.title} poster" loading="lazy"><div class="fallback"><div class="fallbackInner"><div class="fallbackTitle">${fallbackText(movie.title)}</div><div class="fallbackYear">${movie.year}</div><div class="fallbackYear">Movie Poster</div></div></div></a><div class="info"><div class="title">${movie.title}</div><div class="year">${movie.year}</div><div class="controls"><button class="smallBtn minus">−</button><div class="countBox">${c} selections</div><button class="smallBtn plus">+</button></div></div>`;const img=card.querySelector("img"),fallback=card.querySelector(".fallback");const cached=posterCache[movie.id];if(cached)img.src=cached;else getPoster(movie).then(src=>{if(src)img.src=src;else{img.style.display="none";fallback.style.display="flex"}});img.onerror=()=>{img.style.display="none";fallback.style.display="flex"};card.querySelector(".plus").onclick=()=>changeVote(movie,1);card.querySelector(".minus").onclick=()=>changeVote(movie,-1);grid.appendChild(card)});renderSummary()}function csvEscape(v){const s=String(v??"");return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s}function downloadCsv(){const rows=[["Movie Title","Year","Selections","Direct Trailer URL"]];MOVIES.map(m=>({title:m.title,year:m.year,selections:countFor(m),trailerUrl:m.trailerUrl})).sort((a,b)=>b.selections-a.selections||a.title.localeCompare(b.title)).forEach(r=>rows.push([r.title,r.year,r.selections,r.trailerUrl]));const csv=rows.map(row=>row.map(csvEscape).join(",")).join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");const date=new Date().toISOString().slice(0,10);a.href=url;a.download=`family-movie-selection-tally-${date}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
function setDock(expanded){
  bottomBar.classList.toggle("collapsed", !expanded);
  toggleDock.textContent = expanded ? "⌄" : "⌃";
  toggleDock.setAttribute("aria-label", expanded ? "Collapse controls" : "Expand controls");
}
toggleDock.onclick = () => setDock(bottomBar.classList.contains("collapsed"));
let lastY = window.scrollY;
window.addEventListener("scroll", () => {
  const y = window.scrollY;
  if (y > 24 && y > lastY) setDock(false);
  lastY = y;
}, {passive:true});
document.addEventListener("click", (e) => {
  if (!bottomBar.contains(e.target) && !bottomBar.classList.contains("collapsed")) setDock(false);
});
search.oninput=render;sort.onchange=render;refresh.onclick=loadVotes;exportCsv.onclick=downloadCsv;render();loadVotes();
